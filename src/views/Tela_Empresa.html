<div id="tela-empresa" class="tela">

  <!-- TABS EMPRESA -->
  <div class="tabs-container">
    <button class="btn-tab-admin ativo" onclick="mudarAbaEmpresa('despacho')">🚌 Roteiro e Despacho Diário</button>
    <button class="btn-tab-admin" onclick="mudarAbaEmpresa('frota')">📋 Gestão da Minha Frota</button>
  </div>

  <!-- ── ABA: DESPACHO DIÁRIO ──────────────────────── -->
  <div id="empresa-aba-despacho" class="aba-admin ativa">

    <!-- Cabeçalho + Filtros de data -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <h4 style="margin:0; color:var(--primary); font-weight:900;">Solicitações Aprovadas para Viagem</h4>

      <div class="d-flex align-items-center gap-2 flex-wrap" style="background:var(--card-bg); padding:6px; border-radius:12px; border:1px solid var(--borda);">
        <button class="btn-subtab ativo" id="btn-filtro-hoje" onclick="filtrarDespachoData('hoje')">Hoje</button>
        <button class="btn-subtab" id="btn-filtro-amanha" onclick="filtrarDespachoData('amanha')">Amanhã</button>
        <button class="btn-subtab" id="btn-filtro-5dias" onclick="filtrarDespachoData('5dias')">Próximos 5 Dias</button>
        <span style="color:var(--borda); padding:0 4px;">|</span>
        <input type="date" id="empresa-data-especifica"
          onchange="filtrarDespachoData('especifica')"
          style="padding:7px 12px; border:1.5px solid var(--borda); border-radius:9px; font-size:.78rem; font-weight:700; background:var(--input-bg); color:var(--texto); outline:none;">
      </div>
    </div>

    <!-- KPIs de frota -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-sm-6">
        <div class="card-kpi" style="color:var(--verde);">
          <div class="kpi-val" id="empresa-frota-disp">0</div>
          <div class="kpi-label">Ônibus Disponíveis</div>
        </div>
      </div>
      <div class="col-12 col-sm-6">
        <div class="card-kpi" style="color:var(--laranja);">
          <div class="kpi-val" id="empresa-frota-req">0</div>
          <div class="kpi-label">Ônibus Necessários (Dia)</div>
        </div>
      </div>
    </div>

    <!-- Lista de despacho -->
    <div id="lista-despacho">
      <p class="loader">Selecione uma data para buscar as viagens...</p>
    </div>

  </div>

  <!-- ── ABA: GESTÃO DA FROTA ──────────────────────── -->
  <div id="empresa-aba-frota" class="aba-admin">

    <div class="subtabs-container mb-4">
      <button class="btn-subtab ativo" onclick="mudarSubAbaFrota('veiculos', 'empresa')">🚐 Meus Veículos</button>
      <button class="btn-subtab" onclick="mudarSubAbaFrota('motoristas', 'empresa')">🧑‍✈️ Meus Motoristas</button>
    </div>

    <!-- Sub: Veículos -->
    <div id="frota-veiculos-empresa" class="subaba-frota-empresa ativa">

      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
        <h4 style="margin:0; color:var(--primary); font-weight:900;">Meus Veículos Cadastrados</h4>
        <button class="btn-submit" style="width:auto; margin:0; padding:9px 16px; font-size:.78rem; background:var(--verde); border-color:var(--verde); color:#fff;" onclick="abrirModalVeiculo()">
          ➕ Novo Veículo
        </button>
      </div>

      <div class="filtros-avancados mb-4">
        <div class="form-group" style="flex:2; min-width:200px;">
          <label>Buscar Veículo ou Placa</label>
          <input type="text" id="filtro-v-busca-emp" placeholder="Pesquisar..." onkeyup="filtrarVeiculosEmpresa()">
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="filtro-v-tipo-emp" onchange="filtrarVeiculosEmpresa()"><option value="">Todos</option></select>
        </div>
        <div class="form-group">
          <label>Disponibilidade</label>
          <select id="filtro-v-disp-emp" onchange="filtrarVeiculosEmpresa()"><option value="">Todas</option></select>
        </div>
      </div>

      <div id="lista-veiculos-empresa" class="grid-cards"></div>
    </div>

    <!-- Sub: Motoristas -->
    <div id="frota-motoristas-empresa" class="subaba-frota-empresa">

      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
        <h4 style="margin:0; color:var(--primary); font-weight:900;">Minha Equipe de Motoristas</h4>
        <button class="btn-submit" style="width:auto; margin:0; padding:9px 16px; font-size:.78rem; background:var(--verde); border-color:var(--verde); color:#fff;" onclick="abrirModalMotorista()">
          ➕ Cadastrar Motorista
        </button>
      </div>

      <div id="lista-motoristas-empresa" class="grid-cards"></div>
    </div>

  </div>

</div>
